name: Skill frontmatter validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate skill frontmatter
        run: node .github/workflows/scripts/validate-skills.js
